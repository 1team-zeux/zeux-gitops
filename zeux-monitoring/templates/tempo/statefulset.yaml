apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tempo
spec:
  replicas: {{ .Values.tempo.replicas }}
  serviceName: tempo
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      volumes:
        - name: config
          configMap:
            name: tempo-config
      containers:
        - name: tempo
          image: {{ .Values.tempo.image }}
          args:
            - "-config.file=/etc/tempo/tempo-config.yaml"
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: tempo-data
              mountPath: /tmp/tempo
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: tempo-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.tempo.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.tempo.storage }}
