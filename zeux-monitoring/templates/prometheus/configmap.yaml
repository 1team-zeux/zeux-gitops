apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.global.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: zeux-central

    rule_files:
      - /etc/prometheus/rules/*.yml
      - /etc/prometheus/tenant-rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.{{ .Values.global.namespace }}.svc.cluster.local:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      - job_name: otel-gateway
        static_configs:
          - targets: [otel-gateway.{{ .Values.global.namespace }}.svc.cluster.local:8888]
