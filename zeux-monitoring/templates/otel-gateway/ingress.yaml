{{- if .Values.otelIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-gateway-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- toYaml .Values.otelIngress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.otelIngress.className }}
  {{- if .Values.otelIngress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.otelIngress.host }}
      secretName: {{ .Values.otelIngress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.otelIngress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: otel-gateway
                port:
                  number: 4318
{{- end }}
