apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-config
  namespace: {{ .Values.global.namespace }}
data:
  repos.yaml: |
    repos:
      - id: github.com/1team-zeux/infra-repo
        allow_custom_workflows: true
        allowed_overrides:
          - workflow
          - apply_requirements
        apply_requirements: []
        workflow: default

    workflows:
      default:
        plan:
          steps:
            - run: |
                TENANT_ID=$(echo "$REPO_REL_DIR" | cut -d'/' -f2)
                curl -sf "${SLA_AGENT_URL}/internal/terraform-vars/${TENANT_ID}" \
                  -o credentials.auto.tfvars
                export AWS_ACCESS_KEY_ID=$(grep 'aws_access_key_id' credentials.auto.tfvars | awk -F'"' '{print $2}')
                export AWS_SECRET_ACCESS_KEY=$(grep 'aws_secret_access_key' credentials.auto.tfvars | awk -F'"' '{print $2}')
                terraform init -input=false -upgrade
                terraform plan -input=false -out="$PLANFILE"
        apply:
          steps:
            - run: |
                TENANT_ID=$(echo "$REPO_REL_DIR" | cut -d'/' -f2)
                curl -sf "${SLA_AGENT_URL}/internal/terraform-vars/${TENANT_ID}" \
                  -o credentials.auto.tfvars
                export AWS_ACCESS_KEY_ID=$(grep 'aws_access_key_id' credentials.auto.tfvars | awk -F'"' '{print $2}')
                export AWS_SECRET_ACCESS_KEY=$(grep 'aws_secret_access_key' credentials.auto.tfvars | awk -F'"' '{print $2}')
                terraform apply -input=false "$PLANFILE"
