apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: {{ .Values.global.registry }}/{{ .Values.frontend.image }}:{{ .Values.frontend.imageTag }}
          ports:
            - containerPort: 80
          env:
            - name: AUTH_SERVER_URL
              value: {{ .Values.frontend.env.authServerUrl }}
            - name: SLA_AGENT_URL
              value: {{ .Values.frontend.env.slaAgentUrl }}
            - name: MONITORING_API_URL
              value: {{ .Values.frontend.env.monitoringApiUrl }}
            - name: API_GATEWAY_URL
              value: {{ .Values.frontend.env.apiGatewayUrl }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
