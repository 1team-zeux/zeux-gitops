apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: auth-server
spec:
  replicas: {{ .Values.authServer.replicas }}
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: auth-server
          image: {{ .Values.global.registry }}/{{ .Values.authServer.image }}:{{ .Values.global.imageTag }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authServer.secret.existingSecret }}
                  key: {{ .Values.authServer.secret.dbUrlKey }}
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authServer.secret.existingSecret }}
                  key: {{ .Values.authServer.secret.dbUsernameKey }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authServer.secret.existingSecret }}
                  key: {{ .Values.authServer.secret.dbPasswordKey }}
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_REGISTERWITHEUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCHREGISTRY
              value: "false"
          resources:
            {{- toYaml .Values.authServer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
