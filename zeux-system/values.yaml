global:
  registry: "amdp-registry.skala-ai.com/skala26a-ai1"
  imageTag: "d584ad9057811f88a40a879e783396e28578ad97"
  namespace: skala3-finalproj-class1-team1


apiGateway:
  image: 1team-api-gateway
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  config:
    authServerUrl: "http://auth-server-svc.skala3-finalproj-class1-team1.svc.cluster.local:8081"
    slaAgentUrl: "http://sla-agent-service-svc.skala3-finalproj-class1-team1.svc.cluster.local:8090"
    monitoringApiUrl: "http://monitoring-api-svc.skala3-finalproj-class1-team1.svc.cluster.local:8091"
    eurekaClientEnabled: "false"
    gatewayDiscoveryEnabled: "false"
  secret:
    existingSecret: api-gateway-secret
    jwtSecretKey: jwt-secret

authServer:
  image: 1team-auth-server
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  secret:
    existingSecret: auth-db-secret
    dbUrlKey: db-url
    dbUsernameKey: db-username
    dbPasswordKey: db-password

slaAgentService:
  image: 1team-sla-agent-service
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  config:
    prometheusUrl: "http://prometheus.skala3-finalproj-class1-team1.svc.cluster.local:9090"
    grafanaUrl: "http://grafana.skala3-finalproj-class1-team1.svc.cluster.local:3000"
    otelHubEndpoint: "http://otel-gateway.skala3-finalproj-class1-team1.svc.cluster.local:4318"
    modelName: "gpt-4o"
    infraBaseBranch: "main"
    grafanaUser: "admin"
  secret:
    existingSecret: sla-agent-secret
    llmApiKeyKey: llm-api-key
    githubAppIdKey: github-app-id
    githubInstallationIdKey: github-installation-id
    githubWebhookSecretKey: github-webhook-secret
    githubRepoOwnerKey: github-repo-owner
    githubRepoNameKey: github-repo-name
    slackBotTokenKey: slack-bot-token
    dbUrlKey: db-url
  tenantRulesPvc: tenant-rules
  tenantRulesStorage: 5Gi
  tenantRulesStorageClassName: efs-sc-shared

monitoringApi:
  image: 1team-monitoring-api
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  config:
    prometheusUrl: "http://prometheus.skala3-finalproj-class1-team1.svc.cluster.local:9090"
    lokiUrl: "http://loki.skala3-finalproj-class1-team1.svc.cluster.local:3100"
    tempoUrl: "http://tempo.skala3-finalproj-class1-team1.svc.cluster.local:3200"

mariadb:
  database: zeux
  username: zeux
  storage: 1Gi
  secret:
    existingSecret: mariadb-secret
    rootPasswordKey: root-password
    passwordKey: user-password

mysql:
  database: zeux
  storage: 1Gi
  secret:
    existingSecret: mysql-secret
    rootPasswordKey: root-password

ingress:
  enabled: true
  host: api.zeux.com
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
