global:
  registry: "amdp-registry.skala-ai.com/skala26a-ai1"
  imageTag: "3fe1b5eb51a26e39e5e56adf02fbb7bd934f0aeb"
  namespace: skala3-finalproj-class1-team1
apiGateway:
  image: 1team-api-gateway
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  config:
    authServerUrl: "http://auth-server-svc.skala3-finalproj-class1-team1.svc.cluster.local:8080"
    slaAgentUrl: "http://sla-agent-service-svc.skala3-finalproj-class1-team1.svc.cluster.local:8090"
    monitoringApiUrl: "http://sla-agent-service-svc.skala3-finalproj-class1-team1.svc.cluster.local:8090"
    eurekaClientEnabled: "false"
    gatewayDiscoveryEnabled: "false"
  secret:
    existingSecret: api-gateway-secret
    jwtSecretKey: jwt-secret
authServer:
  image: 1team-auth-server
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  secret:
    existingSecret: auth-db-secret
    dbUrlKey: db-url
    dbUsernameKey: db-username
    dbPasswordKey: db-password
slaAgentService:
  image: 1team-sla-agent-service
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  config:
    prometheusUrl: "http://prometheus.skala3-finalproj-class1-team1.svc.cluster.local:9090"
    grafanaUrl: "http://grafana.skala3-finalproj-class1-team1.svc.cluster.local:3000"
    otelHubEndpoint: "https://otel-zeux.skala25a.project.skala-ai.com"
    modelName: "gpt-4o"
    infraBaseBranch: "main"
    grafanaUser: "admin"
    baseUrl: "https://api-zeux.skala25a.project.skala-ai.com"
  secret:
    existingSecret: sla-agent-secret
    llmApiKeyKey: llm-api-key
    githubAppIdKey: github-app-id
    githubInstallationIdKey: github-installation-id
    githubWebhookSecretKey: github-webhook-secret
    githubRepoOwnerKey: github-repo-owner
    githubRepoNameKey: github-repo-name
    slackBotTokenKey: slack-bot-token
    dbUrlKey: db-url
  tenantRulesPvc: tenant-rules
  tenantRulesStorage: 5Gi
  tenantRulesStorageClassName: efs-sc-shared
monitoringApi:
  image: 1team-monitoring-api
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  config:
    prometheusUrl: "http://prometheus.skala3-finalproj-class1-team1.svc.cluster.local:9090"
    lokiUrl: "http://loki.skala3-finalproj-class1-team1.svc.cluster.local:3100"
    tempoUrl: "http://tempo.skala3-finalproj-class1-team1.svc.cluster.local:3200"
mariadb:
  database: zeux
  username: zeux
  storage: 1Gi
  secret:
    existingSecret: mariadb-secret
    rootPasswordKey: root-password
    passwordKey: user-password
mysql:
  database: zeux
  storage: 1Gi
  secret:
    existingSecret: mysql-secret
    rootPasswordKey: root-password
ingress:
  enabled: true
  host: api-zeux.skala25a.project.skala-ai.com
  className: public-nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true
    secretName: api-zeux-tls
frontend:
  image: 1team-frontend
  imageTag: "361d629cd2dc980bc40f168ba2ad447880aeb32c"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  env:
    authServerUrl: "http://auth-server-svc:8080"
    slaAgentUrl: "http://sla-agent-service-svc:8090"
    monitoringApiUrl: "http://monitoring-api-svc:8091"
    apiGatewayUrl: "http://api-gateway-svc:8080"
  ingress:
    enabled: true
    host: zeux.skala25a.project.skala-ai.com
    className: public-nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    tls:
      enabled: true
      secretName: fe-zeux-tls
atlantis:
  image: ghcr.io/runatlantis/atlantis
  imageTag: "v0.32.0"
  storage: 5Gi
  storageClassName: gp3
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  config:
    atlantisUrl: "https://atlantis.skala25a.project.skala-ai.com"
    ghAppId: "3672028"
    ghAppInstallationId: "131294114"
    repoAllowlist: "github.com/1team-zeux/infra-repo"
    logLevel: "info"
    slaAgentUrl: "http://sla-agent-service-svc:8090"
  secret:
    existingSecret: atlantis-secret
    webhookSecretKey: gh-webhook-secret
    ghAppKeyFileKey: github-app.pem
  ingress:
    enabled: true
    host: atlantis.skala25a.project.skala-ai.com
    className: public-nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    tls:
      enabled: true
      secretName: atlantis-tls
